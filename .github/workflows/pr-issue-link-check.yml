name: PR Issue Link Check

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  check-linked-issue:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Require linked issue in PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- pr-issue-link-check -->';

            async function upsertComment(body) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

            async function deleteCommentIfPresent() {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
              if (!existing) {
                return;
              }
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

            const result = await github.graphql(
              `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 10) {
                        totalCount
                      }
                    }
                  }
                }
              `,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: pr.number,
              }
            );

            const linkedIssues = result.repository.pullRequest.closingIssuesReferences.totalCount;
            if (linkedIssues > 0) {
              await deleteCommentIfPresent();
              return;
            }

            await upsertComment(`${marker}
            This PR is missing a linked issue.

            Please update the PR description with one of:
            - \`Closes #<number>\`
            - \`Fixes #<number>\`
            - \`Resolves #<number>\`

            The linked issue gives reviewers the right context and lets GitHub close the issue automatically when this PR merges.`);

            core.setFailed('No linked issue found for this PR.');
