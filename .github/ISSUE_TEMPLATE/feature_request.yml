name: Feature Request
description: Propose a user workflow or product capability improvement.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Direction
      description: Describe the intended behavior, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Constraints or Non-Goals
      description: Call out boundaries, tradeoffs, or explicit non-goals.
