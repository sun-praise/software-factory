<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="container">
      <p>
        <a href="/">Back to runs</a> ·
        <a href="/settings">Settings</a>
      </p>

      <header>
        <h1>{{ title }}</h1>
        <p class="muted">Submit an issue payload manually and enqueue one autofix run.</p>
      </header>

      {% if message %}
      <p class="status ok">{{ message }}</p>
      {% endif %}

      {% if result %}
      <section class="status-block">
        <h2>Submit result</h2>
        <pre class="log">{{ result | tojson(indent=2) }}</pre>
      </section>
      {% endif %}

      <form method="post" action="/issues" class="issue-form">
        <fieldset>
          <legend>PR Info</legend>

          <label for="repo">Repository</label>
          <input type="text" id="repo" name="repo" required value="{{ form.repo | default('') }}" placeholder="owner/repo">

          <label for="pr_number">PR Number</label>
          <input type="number" id="pr_number" name="pr_number" required min="1" value="{{ form.pr_number | default('') }}">

          <label for="issue_number">Issue Number (optional)</label>
          <input type="number" id="issue_number" name="issue_number" min="1" value="{{ form.issue_number | default('') }}">

          <label for="head_sha">Head SHA (optional)</label>
          <input type="text" id="head_sha" name="head_sha" value="{{ form.head_sha | default('') }}" placeholder="abc123">

          <label for="branch">Branch (optional)</label>
          <input type="text" id="branch" name="branch" value="{{ form.branch | default('') }}" placeholder="feat/xxx">
        </fieldset>

        <fieldset>
          <legend>Issue Content</legend>

          <label for="title">Issue Title</label>
          <input type="text" id="title" name="title" required value="{{ form.title | default('') }}">

          <label for="body">Issue Body / Description</label>
          <textarea id="body" name="body" required rows="7">{{ form.body | default('') }}</textarea>

          <label for="project_type">Project Type (optional)</label>
          <input type="text" id="project_type" name="project_type" value="{{ form.project_type | default('') }}" placeholder="python / node / go / rust">

          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="must_fix"{% if form.priority | default('must_fix') == 'must_fix' %} selected{% endif %}>Must Fix</option>
            <option value="should_fix"{% if form.priority | default('must_fix') == 'should_fix' %} selected{% endif %}>Should Fix</option>
          </select>

          <label for="severity">Severity</label>
          <select id="severity" name="severity">
            <option value="P1"{% if form.severity | default('P1') == 'P1' %} selected{% endif %}>P1</option>
            <option value="P0"{% if form.severity | default('P1') == 'P0' %} selected{% endif %}>P0</option>
            <option value="P2"{% if form.severity | default('P1') == 'P2' %} selected{% endif %}>P2</option>
            <option value="P3"{% if form.severity | default('P1') == 'P3' %} selected{% endif %}>P3</option>
          </select>
        </fieldset>

        <div class="actions">
          <button type="submit">Enqueue autofix</button>
        </div>
      </form>
    </main>
  </body>
</html>
