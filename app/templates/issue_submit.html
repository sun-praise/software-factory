<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="container">
      <p>
        <a href="/">Back to runs</a> ·
        <a href="/settings">Settings</a>
      </p>

      <header>
        <h1>{{ title }}</h1>
        <p class="muted">Paste a GitHub pull request URL or PR issue URL and enqueue one autofix run.</p>
      </header>

      {% if message %}
      <p class="status ok">{{ message }}</p>
      {% endif %}

      {% if result %}
      <section class="status-block">
        <h2>Submit result</h2>
        <pre class="log">{{ result | tojson(indent=2) }}</pre>
      </section>
      {% endif %}

      <form method="post" action="/issues" class="issue-form">
        <label for="url">GitHub pull request / issue URL</label>
        <input type="url" id="url" name="url" required value="{{ form.url | default('') }}" placeholder="https://github.com/owner/repo/pull/123 or .../issues/123">

        <div class="actions">
          <button type="submit">Enqueue autofix</button>
        </div>
      </form>
    </main>
  </body>
</html>
